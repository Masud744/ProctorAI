<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Exam Monitor — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>⬡ AI EXAM MONITOR</h1>
      <p>Intelligent Proctoring System</p>
    </div>
    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login', event)">Login</div>
        <div class="tab" onclick="switchTab('signup', event)">Sign Up</div>
      </div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="btn" onclick="login()">Login</button>
        <span class="forgot-link" onclick="showForgot()">Forgot password?</span>
        <div id="loginMsg" class="message"></div>
      </div>

      <!-- Signup Form -->
      <div id="signupForm" class="hidden">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min 6 characters">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="signupRole">
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
          </select>
        </div>
        <button class="btn" onclick="signup()">Create Account</button>
        <div id="signupMsg" class="message"></div>
      </div>

      <!-- Forgot Password Form -->
      <div id="forgotForm" class="hidden">
        <p class="forgot-desc">Enter your email and we'll send a reset link.</p>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="forgotEmail" placeholder="you@example.com">
        </div>
        <button class="btn" onclick="forgotPassword()">Send Reset Link</button>
        <span class="back-link" onclick="showLogin()">← Back to Login</span>
        <div id="forgotMsg" class="message"></div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
