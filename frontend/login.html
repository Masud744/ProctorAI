<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Exam Monitor — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #00d4ff;
      letter-spacing: 1px;
    }

    .logo p {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .card {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 32px;
    }

    .tabs {
      display: flex;
      margin-bottom: 28px;
      background: #0a0a0f;
      border-radius: 8px;
      padding: 4px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 14px;
      cursor: pointer;
      border-radius: 6px;
      color: #666;
      transition: all 0.2s;
    }

    .tab.active {
      background: #1e1e2e;
      color: #00d4ff;
      font-weight: 600;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus { border-color: #00d4ff; }
    select option { background: #0a0a0f; }

    .btn {
      width: 100%;
      padding: 13px;
      background: #00d4ff;
      color: #000;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: #555;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: #00d4ff; }

    .message {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .message.success {
      background: #0d2e1a;
      color: #4ade80;
      border: 1px solid #166534;
      display: block;
    }

    .message.error {
      background: #2e0d0d;
      color: #f87171;
      border: 1px solid #991b1b;
      display: block;
    }

    .hidden { display: none; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      transition: color 0.2s;
    }
    .back-link:hover { color: #00d4ff; }

    .forgot-desc {
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>⬡ AI EXAM MONITOR</h1>
      <p>Intelligent Proctoring System</p>
    </div>

    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login', event)">Login</div>
        <div class="tab" onclick="switchTab('signup', event)">Sign Up</div>
      </div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="btn" onclick="login()">Login</button>
        <span class="forgot-link" onclick="showForgot()">Forgot password?</span>
        <div id="loginMsg" class="message"></div>
      </div>

      <!-- Signup Form -->
      <div id="signupForm" class="hidden">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min 6 characters">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="signupRole">
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
          </select>
        </div>
        <button class="btn" onclick="signup()">Create Account</button>
        <div id="signupMsg" class="message"></div>
      </div>

      <!-- Forgot Password Form -->
      <div id="forgotForm" class="hidden">
        <p class="forgot-desc">
          Enter your email address and we'll send you a link to reset your password.
        </p>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="forgotEmail" placeholder="you@example.com">
        </div>
        <button class="btn" onclick="forgotPassword()">Send Reset Link</button>
        <span class="back-link" onclick="showLogin()">← Back to Login</span>
        <div id="forgotMsg" class="message"></div>
      </div>

    </div>
  </div>

  <script>
    const API = "http://localhost:8000/api";

    function switchTab(tab, e) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('forgotForm').classList.add('hidden');
    }

    function showForgot() {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('signupForm').classList.add('hidden');
      document.getElementById('forgotForm').classList.remove('hidden');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    }

    function showLogin() {
      document.getElementById('forgotForm').classList.add('hidden');
      document.getElementById('signupForm').classList.add('hidden');
      document.getElementById('loginForm').classList.remove('hidden');
      document.querySelectorAll('.tab')[0].classList.add('active');
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `message ${type}`;
    }

    async function login() {
      const email    = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showMsg('loginMsg', 'Please fill all fields', 'error');
        return;
      }

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('user', JSON.stringify(data.user));
          const role = data.user.user_metadata?.role;
          showMsg('loginMsg', 'Login successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = role === 'teacher' ? 'teacher.html' : 'student.html';
          }, 1000);
        } else {
          showMsg('loginMsg', data.detail || 'Login failed', 'error');
        }
      } catch (e) {
        showMsg('loginMsg', 'Server error. Is the backend running?', 'error');
      }
    }

    async function signup() {
      const full_name = document.getElementById('signupName').value;
      const email     = document.getElementById('signupEmail').value;
      const password  = document.getElementById('signupPassword').value;
      const role      = document.getElementById('signupRole').value;

      if (!full_name || !email || !password) {
        showMsg('signupMsg', 'Please fill all fields', 'error');
        return;
      }

      try {
        const res = await fetch(`${API}/auth/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, full_name, role })
        });

        const data = await res.json();

        if (res.ok) {
          showMsg('signupMsg', 'Account created! Please login.', 'success');
        } else {
          showMsg('signupMsg', data.detail || 'Signup failed', 'error');
        }
      } catch (e) {
        showMsg('signupMsg', 'Server error. Is the backend running?', 'error');
      }
    }

    async function forgotPassword() {
      const email = document.getElementById('forgotEmail').value.trim();

      if (!email) {
        showMsg('forgotMsg', 'Please enter your email', 'error');
        return;
      }

      try {
        const res = await fetch(`${API}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        if (res.ok) {
          showMsg('forgotMsg', 'Reset link sent! Check your email.', 'success');
        } else {
          showMsg('forgotMsg', 'Something went wrong. Try again.', 'error');
        }
      } catch(e) {
        showMsg('forgotMsg', 'Server error. Is backend running?', 'error');
      }
    }
  </script>
</body>
</html>
